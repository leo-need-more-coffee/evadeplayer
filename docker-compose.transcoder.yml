# Standalone compose for running the transcoder on a separate server.
#
# On the remote server:
#   1. Clone the repo (or copy just the transcoder/ dir + this file + Makefile)
#   2. cp .env.transcoder.example .env  and fill in MAIN_SERVER_IP
#   3. docker compose -f docker-compose.transcoder.yml up -d
#
# GPU variants:
#   Nvidia: docker compose -f docker-compose.transcoder.yml -f docker-compose.nvidia.yml up -d
#   VAAPI:  docker compose -f docker-compose.transcoder.yml -f docker-compose.vaapi.yml  up -d

services:
  transcoder:
    build:
      context: ./transcoder
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
