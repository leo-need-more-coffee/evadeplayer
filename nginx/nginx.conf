worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip off;

    upstream api {
        server api:8000;
    }

    upstream seaweed_filer {
        server seaweedfs-filer:8888;
    }

    map $uri $hls_content_type {
        default application/octet-stream;
        ~\.ts$ video/mp2t;
        ~\.(m4s|mp4)$ video/mp4;
        ~\.jpe?g$ image/jpeg;
        ~\.vtt$ text/vtt;
    }

    server {
        listen 80;
        server_name _;

        # API proxy (–≤—Б–µ /api/* вЖТ Go)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            client_max_body_size 10g;
        }

        # HLS manifest proxy вАФ Go –њ–µ—А–µ–њ–Є—Б—Л–≤–∞–µ—В URL –Є –≤—Б—В–∞–≤–ї—П–µ—В —В–Њ–Ї–µ–љ—Л.
        # CORS –≤—Л—Б—В–∞–≤–ї—П–µ—В —Б–∞–Љ API —З–µ—А–µ–Ј CORSMiddleware вАФ –Ј–і–µ—Б—М –љ–µ –і—Г–±–ї–Є—А—Г–µ–Љ.
        location /hls-proxy/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # HLS segments вАФ nginx –љ–∞–њ—А—П–Љ—Г—О –≤ SeaweedFS, –љ–Њ —Б–љ–∞—З–∞–ї–∞ –њ—А–Њ–≤–µ—А—П–µ–Љ —В–Њ–Ї–µ–љ.
        # –Я–Њ–і–і–µ—А–ґ–Є–≤–∞—О—В—Б—П: .ts, .m4s, init.mp4 –Є HLS image stream .jpg.
        # –Я—Г—В—М: /hls/<videoID>/<codec>/<quality>/<file>?token=...&expires=...
        location ~ ^/hls/([^/]+)/(.+\.(ts|m4s|mp4|jpe?g|vtt))$ {
            # –°–Њ—Е—А–∞–љ—П–µ–Љ –љ—Г–ґ–љ—Л–µ –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ –Ф–Ю auth_request.
            # nginx –њ–µ—А–µ–і–∞—С—В –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ, –Ј–∞–і–∞–љ–љ—Л–µ set{}, –≤ subrequest.
            set $hls_video_id $1;
            set $hls_token    $arg_token;
            set $hls_expires  $arg_expires;

            auth_request /internal/validate-hls-chunk;

            proxy_pass http://seaweed_filer/hls/$1/$2;
            proxy_set_header Host seaweedfs-filer;
            proxy_hide_header Content-Type;
            proxy_hide_header Access-Control-Allow-Origin;

            add_header Content-Type $hls_content_type always;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # –Т–љ—Г—В—А–µ–љ–љ–Є–є —Н–љ–і–њ–Њ–Є–љ—В –≤–∞–ї–Є–і–∞—Ж–Є–Є —В–Њ–Ї–µ–љ–∞ –і–ї—П —З–∞–љ–Ї–Њ–≤.
        # nginx –њ–µ—А–µ–і–∞—С—В video_id, token, expires —З–µ—А–µ–Ј –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ.
        location = /internal/validate-hls-chunk {
            internal;
            # $hls_video_id, $hls_token, $hls_expires вАФ –Є–Ј —А–Њ–і–Є—В–µ–ї—М—Б–Ї–Њ–≥–Њ location
            proxy_pass http://api/internal/validate-hls?video_id=$hls_video_id&token=$hls_token&expires=$hls_expires;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Thumbnails вАФ –њ—Г–±–ї–Є—З–љ—Л–µ, –±–µ–Ј —В–Њ–Ї–µ–љ–∞.
        location ~ ^/thumbnails/(.+)$ {
            proxy_pass http://seaweed_filer/thumbnails/$1;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
